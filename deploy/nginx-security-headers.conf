# Baytara security headers. Installed at /etc/nginx/snippets/baytara-security.conf
# and `include`d in the server block + the /assets location (nginx add_header does not
# inherit into a location that sets its own add_header, so it must be repeated there).
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
# CSP: self by default; inline styles (React) + Google Fonts; images from any https (admin-set
# course/cover URLs); the VdoCipher DRM player iframe; API is same-origin (connect-src 'self').
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self'; frame-src https://player.vdocipher.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
