# Baytara — Main Website (static SPA) + Admin Portal (/admin) + API (/api -> gunicorn).
# Behind Cloudflare proxy; wildcard cert *.mubarmijonline.com. Live copy: /etc/nginx/sites-enabled/baytara
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name baytara.mubarmijonline.com;

    ssl_certificate     /etc/nginx/certs/elamal.pem;
    ssl_certificate_key /etc/nginx/certs/elamal.key;

    server_tokens off;
    include /etc/nginx/snippets/baytara-security.conf;

    root /var/www/baytara;
    index index.html;

    # API -> Flask/Gunicorn backend
    location /api/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 8m;
    }

    # Admin Portal SPA (built with base=/admin/)
    location /admin/ {
        alias /var/www/baytara-admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # Main Website SPA fallback (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        include /etc/nginx/snippets/baytara-security.conf;  # re-apply (own add_header overrides inheritance)
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name baytara.mubarmijonline.com;
    return 301 https://baytara.mubarmijonline.com$request_uri;
}
