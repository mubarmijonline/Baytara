# Baytara — Main Website (static SPA) + Admin Portal (/admin) + API (/api -> gunicorn).
# Behind Cloudflare proxy; wildcard cert *.mubarmijonline.com. Live copy: /etc/nginx/sites-enabled/baytara
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name baytara.mubarmijonline.com;

    ssl_certificate     /etc/nginx/certs/elamal.pem;
    ssl_certificate_key /etc/nginx/certs/elamal.key;

    server_tokens off;
    include /etc/nginx/snippets/baytara-security.conf;

    root /var/www/baytara;
    index index.html;

    # API -> Flask/Gunicorn backend
    location /api/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 8m;
    }

    # Admin Portal SPA (built with base=/admin/)
    location /admin/ {
        include /etc/nginx/snippets/baytara-security.conf;
        add_header Cache-Control "no-store, must-revalidate" always;  # HTML always fresh
        alias /var/www/baytara-admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # Instructor Portal SPA (built with base=/instructor/)
    location /instructor/ {
        include /etc/nginx/snippets/baytara-security.conf;
        add_header Cache-Control "no-store, must-revalidate" always;
        alias /var/www/baytara-instructor/;
        try_files $uri $uri/ /instructor/index.html;
    }

    # Main Website SPA fallback (React Router). HTML must never be cached so the
    # browser always picks up the current hashed bundle.
    location / {
        include /etc/nginx/snippets/baytara-security.conf;
        add_header Cache-Control "no-store, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    # Hashed build assets are immutable — safe to cache forever (this location
    # sets its own add_header, so re-include the security snippet).
    location /assets/ {
        include /etc/nginx/snippets/baytara-security.conf;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name baytara.mubarmijonline.com;
    return 301 https://baytara.mubarmijonline.com$request_uri;
}
