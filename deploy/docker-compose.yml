# Dev data tier for Baytara. API + NginX containers come in Phase 9.
# Defaults match backend/.env.example. Bring up: docker compose -f deploy/docker-compose.yml up -d
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: baytara
      POSTGRES_PASSWORD: baytara
      POSTGRES_DB: baytara
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baytara"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  mongodata:
  redisdata:
