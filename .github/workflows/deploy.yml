name: Deploy Main Website to Cloudflare

# Auto-deploy on every push to main that touches the web app, plus a manual
# "Run workflow" button. Requires two repo secrets:
#   CLOUDFLARE_API_TOKEN   (Workers Scripts: Edit)
#   CLOUDFLARE_ACCOUNT_ID
on:
  push:
    branches: [main]
    paths: ["frontend/web/**", ".github/workflows/deploy.yml"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build
        working-directory: frontend/web
        run: |
          npm ci
          npm run build
      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend/web
          command: deploy
